; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
platform = espressif32
board = nodemcu-32s
framework = arduino
lib_deps = 
    fastled/FastLED@^3.10.1
    ArduinoJson
    knolleary/PubSubClient@2.8
monitor_speed = 115200

[env:peg_esp32]
extends = common
build_flags = 
    -DDEVICE_ID_ESP32_PEG
    -DLED_PIN_0=12
    -DLED_PIN_1=13
    -DLED_PIN_2=14
    -DNUM_LEDS_0=88
    -DNUM_LEDS_1=88
    -DNUM_LEDS_2=88

[env:desk_esp32]
extends = common
build_flags =
    -DDEVICE_ID_ESP32_DESK
    -DLED_PIN_0=25
    -DNUM_LEDS_0=108

[env:wall_esp32]
extends = common
build_flags =
    -DDEVICE_ID_ESP32_WALL
    -DLED_PIN_0=16
    -DNUM_LEDS_0=69

[env:test_esp32]
extends = common
build_flags =
    -DDEVICE_ID_ESP32_TEST
    -DLED_PIN_0=25
    -DNUM_LEDS_0=108

; --- OTA variants: same firmware, uploaded over WiFi instead of USB ---
; First flash of a device must be over USB; after that use these.
; If <hostname>.local does not resolve, pass the device IP:
;   pio run -e desk_esp32_ota -t upload --upload-port 192.168.x.x

[env:peg_esp32_ota]
extends = env:peg_esp32
upload_protocol = espota
upload_port = 192.168.1.88
extra_scripts = pre:scripts/ota_auth.py

[env:desk_esp32_ota]
extends = env:desk_esp32
upload_protocol = espota
upload_port = 192.168.1.116
extra_scripts = pre:scripts/ota_auth.py

[env:wall_esp32_ota]
extends = env:wall_esp32
upload_protocol = espota
upload_port = 192.168.1.139
extra_scripts = pre:scripts/ota_auth.py

[env:test_esp32_ota]
extends = env:test_esp32
upload_protocol = espota
upload_port = esp32_test_led.local
extra_scripts = pre:scripts/ota_auth.py